name: Build and Deploy

on:
  push:
    # Listen on both common default-branch conventions so this workflow
    # fires regardless of whether the repo's default branch is `main`
    # or `master`.
    branches: [main, master]
  workflow_dispatch:

# Serialize deploys so simultaneous pushes don't race-write the
# gh-pages branch tip. cancel-in-progress: false queues newer runs
# behind older ones — safest for force_orphan rebases.
concurrency:
  group: pages
  cancel-in-progress: false

# peaceiris/actions-gh-pages needs `contents: write` to push the built
# site into the `gh-pages` branch on every run. (It's idempotent: each
# run overwrites the branch's previous contents.)
permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build for production
        run: npm run build

      - name: Publish dist/ to the gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The contents of dist/ are written to the root of gh-pages.
          # Vite's `base: '/SBWPro/'` ensures every asset URL emitted in
          # dist/index.html resolves correctly when Pages serves the
          # site from the gh-pages branch at /SBWPro/.
          publish_dir: ./dist
          # Force-push overwrites the previous build atomically. Keeps
          # the gh-pages branch lean (one commit per deploy) instead of
          # accumulating history.
          force_orphan: true
