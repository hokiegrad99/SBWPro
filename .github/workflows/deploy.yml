name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress deploy when a new commit lands, and serialize them
# so simultaneous pushes don't fight for the same Pages slot.
concurrency:
  group: pages
  cancel-in-progress: false

# Least-privilege permissions required by the official GitHub Pages deploy
# action: pages:write to publish, id-token:write for OIDC auth.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build for production
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
